# golangci-lint v2 configuration for PEAC Go SDK
version: '2'

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

linters-settings:
  errcheck:
    exclude-functions:
      - (*testing.T).Errorf
      - (*testing.T).Fatalf
      - (*testing.T).Error
      - (*testing.T).Fatal
  staticcheck:
    checks:
      - 'all'
      - '-SA1019'

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - jwks
    - middleware
