# Publish @peac/mcp-server to the MCP Registry (DD-140).
#
# Triggered by:
#   - Manual dispatch only (workflow_dispatch)
#   - Run AFTER npm publish is complete (the MCP Registry validates the npm package)
#
# Prerequisites:
#   1. @peac/mcp-server published to npm with matching version
#   2. package.json has "mcpName": "io.github.peacprotocol/peac"
#   3. server.json version matches npm-published version
#
# Authentication:
#   - Uses GitHub OIDC (no long-lived tokens needed)
#   - Server name must start with io.github.peacprotocol/ (matches GitHub org)
#
# References:
#   - MCP Registry Quickstart: https://modelcontextprotocol.io/registry/quickstart
#   - GitHub Actions: https://modelcontextprotocol.io/registry/github-actions

name: Publish to MCP Registry

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (validate server.json without publishing)'
        type: boolean
        default: false

jobs:
  publish-mcp-registry:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write # Required for OIDC authentication
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version

      - name: Validate server.json exists
        run: |
          if [ ! -f packages/mcp-server/server.json ]; then
            echo "ERROR: packages/mcp-server/server.json not found"
            exit 1
          fi
          echo "server.json contents:"
          cat packages/mcp-server/server.json

      - name: Validate mcpName matches server.json name
        run: |
          SERVER_NAME=$(node -e "console.log(JSON.parse(require('fs').readFileSync('packages/mcp-server/server.json','utf8')).name)")
          MCP_NAME=$(node -e "console.log(JSON.parse(require('fs').readFileSync('packages/mcp-server/package.json','utf8')).mcpName || '')")
          if [ "$SERVER_NAME" != "$MCP_NAME" ]; then
            echo "ERROR: server.json name ($SERVER_NAME) does not match package.json mcpName ($MCP_NAME)"
            exit 1
          fi
          echo "OK: name=$SERVER_NAME"

      - name: Install mcp-publisher (pinned to v1.7.9 with checksum verification)
        env:
          MCP_PUBLISHER_VERSION: v1.7.9
          # SHA-256 checksums from https://github.com/modelcontextprotocol/registry/releases/tag/v1.7.9
          CHECKSUM_LINUX_AMD64: 'ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac'
          CHECKSUM_LINUX_ARM64: '04f5199b3deef8e6fc4d6ed98c56a74f799def53edca3fe6d4862ecd4397c172'
        run: |
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          TARBALL="mcp-publisher_linux_${ARCH}.tar.gz"
          curl -fsSL -o "$TARBALL" "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/${TARBALL}"

          # Verify checksum before extracting
          if [ "$ARCH" = "amd64" ]; then
            EXPECTED="$CHECKSUM_LINUX_AMD64"
          elif [ "$ARCH" = "arm64" ]; then
            EXPECTED="$CHECKSUM_LINUX_ARM64"
          else
            echo "ERROR: Unsupported architecture: $ARCH"
            exit 1
          fi
          ACTUAL=$(sha256sum "$TARBALL" | awk '{print $1}')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "ERROR: Checksum mismatch for $TARBALL"
            echo "  Expected: $EXPECTED"
            echo "  Actual:   $ACTUAL"
            exit 1
          fi
          echo "OK: Checksum verified for $TARBALL ($ARCH)"

          tar xzf "$TARBALL" mcp-publisher
          rm -f "$TARBALL"
          chmod +x ./mcp-publisher
          ./mcp-publisher --help

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        working-directory: packages/mcp-server
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "DRY RUN: Would publish server.json to MCP Registry"
            echo "server.json:"
            cat server.json
            echo ""
            echo "Skipping publish (dry_run=true)"
          else
            ../../mcp-publisher publish
          fi
