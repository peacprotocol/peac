# Promote npm dist-tag from 'next' to 'latest' for all published @peac/* packages
#
# Triggered by: Manual dispatch only (workflow_dispatch)
#
# Uses NPM_TOKEN secret (automation token) because npm dist-tag operations
# are not supported by OIDC Trusted Publishing (which only covers npm publish).
#
# Prerequisites:
#   1. Create an npm automation token with read/write access to @peac scope
#   2. Store it as NPM_TOKEN secret in the npm-production environment

name: Promote to latest

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to promote (e.g., 0.10.11)'
        type: string
        required: true
      dry_run:
        description: 'Dry run (check tags without changing them)'
        type: boolean
        default: true
      skip_release_finalize:
        description: 'Skip Stage 2 GitHub Release finalization (leave stage 1 state intact)'
        type: boolean
        default: false
      skip_closeout_verify:
        description: 'Skip the post-promote truth reconciler (verify-release-closeout)'
        type: boolean
        default: false

concurrency:
  group: npm-promote
  cancel-in-progress: false

permissions: {}

jobs:
  promote:
    name: Promote dist-tag
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write # Stage 2 GitHub Release finalization
    environment: npm-production
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'
          registry-url: 'https://registry.npmjs.org'

      - name: Load publish manifest
        id: manifest
        run: |
          VERSION="${{ inputs.version }}"
          PACKAGES=$(node -p "require('./scripts/publish-manifest.json').packages.join(' ')")
          COUNT=$(node -p "require('./scripts/publish-manifest.json').packages.length")
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Promoting $COUNT packages to latest @ $VERSION"

      - name: Verify all packages exist at version
        run: |
          VERSION="${{ inputs.version }}"
          PACKAGES="${{ steps.manifest.outputs.packages }}"
          MISSING=""

          for PKG in $PACKAGES; do
            if npm view "$PKG@$VERSION" version > /dev/null 2>&1; then
              echo "OK: $PKG@$VERSION"
            else
              echo "MISSING: $PKG@$VERSION"
              MISSING="$MISSING $PKG"
            fi
          done

          if [ -n "$MISSING" ]; then
            echo ""
            echo "ERROR: These packages are not published at $VERSION:$MISSING"
            exit 1
          fi
          echo ""
          echo "All packages verified at $VERSION"

      - name: Show current dist-tags (dry run)
        if: inputs.dry_run
        run: |
          VERSION="${{ inputs.version }}"
          PACKAGES="${{ steps.manifest.outputs.packages }}"

          echo "=== DRY RUN: Current dist-tags ==="
          for PKG in $PACKAGES; do
            CURRENT=$(npm view "$PKG" dist-tags.latest 2>/dev/null || echo "N/A")
            NEXT=$(npm view "$PKG" dist-tags.next 2>/dev/null || echo "N/A")
            echo "$PKG  latest=$CURRENT  next=$NEXT  -> would set latest=$VERSION"
          done
          echo ""
          echo "No changes made (dry run)."

      - name: Verify npm token health
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Checking npm token validity..."
          WHOAMI=$(npm whoami 2>&1) || {
            echo "ERROR: npm token is invalid or expired."
            echo "Output: $WHOAMI"
            echo ""
            echo "To fix: rotate the NPM_TOKEN secret in the npm-production environment."
            echo "See docs/RELEASING.md for token rotation instructions."
            exit 1
          }
          echo "OK: Authenticated as '$WHOAMI'"

      - name: Promote to latest
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          PACKAGES="${{ steps.manifest.outputs.packages }}"
          SUCCESS=0
          FAIL=0

          echo "=== PROMOTING TO LATEST ==="
          for PKG in $PACKAGES; do
            echo -n "$PKG@$VERSION -> latest ... "
            if npm dist-tag add "$PKG@$VERSION" latest 2>&1; then
              echo "OK"
              SUCCESS=$((SUCCESS + 1))
            else
              echo "FAILED"
              FAIL=$((FAIL + 1))
            fi
          done

          echo ""
          echo "Results: $SUCCESS succeeded, $FAIL failed"

          if [ $FAIL -gt 0 ]; then
            echo "ERROR: Some packages failed to promote"
            exit 1
          fi

      - name: Verify promoted tags
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="${{ inputs.version }}"
          PACKAGES="${{ steps.manifest.outputs.packages }}"
          WRONG=""

          echo "=== POST-PROMOTE VERIFICATION ==="
          sleep 5  # Brief pause for registry propagation

          for PKG in $PACKAGES; do
            LATEST=$(npm view "$PKG" dist-tags.latest 2>/dev/null || echo "N/A")
            if [ "$LATEST" = "$VERSION" ]; then
              echo "OK: $PKG latest=$LATEST"
            else
              echo "WARN: $PKG latest=$LATEST (expected $VERSION)"
              WRONG="$WRONG $PKG"
            fi
          done

          if [ -n "$WRONG" ]; then
            echo ""
            echo "Some packages may not have propagated yet:$WRONG"
            echo "This can be normal -- check again in a few minutes."
          fi

      # ----------------------------------------------------------------------
      # Stage 2: finalize the GitHub Release (post-promote to latest).
      # Runs only on real promote (not dry run) and only when the operator
      # has not set skip_release_finalize. Reads the release notes from
      # CHANGELOG.md so edits between stage 1 and stage 2 propagate.
      # ----------------------------------------------------------------------
      - name: Checkout for Stage 2 finalize
        if: ${{ !inputs.dry_run && !inputs.skip_release_finalize }}
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Finalize GitHub Release (Stage 2)
        if: ${{ !inputs.dry_run && !inputs.skip_release_finalize }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          TAG="v$VERSION"

          if ! gh release view "$TAG" --json tagName > /dev/null 2>&1; then
            echo "ERROR: no GitHub Release at $TAG to finalize"
            echo "If this release was created with skip_release=true in publish.yml,"
            echo "run promote-latest again with skip_release_finalize=true."
            exit 1
          fi

          NOTES_PATH="$RUNNER_TEMP/release-notes.md"
          node scripts/extract-changelog-entry.mjs --version "$VERSION" > "$NOTES_PATH"
          RELEASE_TITLE=$(node scripts/extract-changelog-entry.mjs --version "$VERSION" --title-only)

          gh release edit "$TAG" \
            --draft=false \
            --prerelease=false \
            --title "$RELEASE_TITLE" \
            --notes-file "$NOTES_PATH"

          echo "Release $TAG finalized (non-draft, non-prerelease): $RELEASE_TITLE"

      # ----------------------------------------------------------------------
      # Post-promote truth reconciler. Runs after the dist-tag flip and the
      # stage 2 release finalization to confirm every public surface agrees.
      # --skip-remote is used because environment approval already gated the
      # promote; the reconciler here validates local release-state artifacts
      # plus npm/gh reachability.
      # ----------------------------------------------------------------------
      - name: Post-promote closeout verification
        if: ${{ !inputs.dry_run && !inputs.skip_closeout_verify }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          # The checkout step above does a shallow fetch by default and
          # does not pull tag refs. The closeout reconciler needs the
          # release tag locally to verify it is reachable from origin/main.
          git fetch --tags --force origin "refs/tags/v${VERSION}:refs/tags/v${VERSION}" || true
          git fetch origin main || true
          echo "Running scripts/verify-release-closeout.mjs --version $VERSION --stage promote ..."
          # --allow-stamp-pending: when this step runs inline the
          # post-promote stamp PR has not landed yet, so facts.json
          # still carries dist_tag=next. Accept that in this narrow
          # window. A strict local run after the stamp PR merges does
          # not pass this flag and gets the full dist_tag=latest check.
          node scripts/verify-release-closeout.mjs \
            --version "$VERSION" \
            --stage promote \
            --allow-stamp-pending \
            --max-updated-age-hours 72

      - name: Summary
        env:
          VERSION: ${{ inputs.version }}
          MODE: ${{ inputs.dry_run == true && 'Dry Run' || 'Production' }}
          COUNT: ${{ steps.manifest.outputs.count }}
          DRY_RUN: ${{ inputs.dry_run }}
          SKIP_RELEASE_FINALIZE: ${{ inputs.skip_release_finalize }}
          SKIP_CLOSEOUT_VERIFY: ${{ inputs.skip_closeout_verify }}
        run: |
          {
            echo "## Promote to Latest Summary"
            echo ""
            echo "- **Version:** ${VERSION}"
            echo "- **Packages:** ${COUNT}"
            echo "- **Mode:** ${MODE}"
            if [ "${DRY_RUN}" = "false" ]; then
              if [ "${SKIP_RELEASE_FINALIZE}" = "false" ]; then
                echo "- **GitHub Release:** Stage 2 finalized (non-draft, non-prerelease)"
              else
                echo "- **GitHub Release:** stage 2 finalize skipped per input"
              fi
              if [ "${SKIP_CLOSEOUT_VERIFY}" = "false" ]; then
                echo "- **Closeout verify:** verify-release-closeout ran against --stage promote"
              else
                echo "- **Closeout verify:** skipped per input"
              fi
            fi
            echo ""
            echo "### Verify"
            echo '```'
            echo "npm view @peac/protocol dist-tags"
            echo "node scripts/verify-release-closeout.mjs --version ${VERSION} --stage promote"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
