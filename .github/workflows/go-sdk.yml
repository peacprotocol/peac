name: Go SDK

on:
  push:
    branches: [main]
    paths:
      - 'sdks/go/**'
      - '.github/workflows/go-sdk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'sdks/go/**'
      - '.github/workflows/go-sdk.yml'

permissions:
  contents: read

concurrency:
  group: go-sdk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Format + Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: sdks/go/go.mod
          cache-dependency-path: |
            sdks/go/go.sum
            sdks/go/middleware/chi/go.sum
            sdks/go/middleware/gin/go.sum

      - name: Format check (core)
        working-directory: sdks/go
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "FAIL: The following files are not formatted:"
            gofmt -l .
            exit 1
          fi
          echo "OK: All files are formatted"

      - name: Lint (core)
        working-directory: sdks/go
        env:
          GOWORK: 'off'
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.9.0
          golangci-lint run --timeout=5m ./. ./jws/... ./evidence/... ./conformance/... ./policy/...

  test:
    name: Build + Test + Race
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: sdks/go/go.mod
          cache-dependency-path: |
            sdks/go/go.sum
            sdks/go/middleware/chi/go.sum
            sdks/go/middleware/gin/go.sum

      - name: Build (core)
        working-directory: sdks/go
        run: go build ./...

      - name: Test (core)
        working-directory: sdks/go
        run: go test ./... -count=1 -coverprofile=coverage.out

      - name: Test with race detector (core)
        working-directory: sdks/go
        run: go test -race ./... -count=1

      - name: Build + Test (middleware/chi)
        working-directory: sdks/go/middleware/chi
        run: |
          go build ./...
          go test ./... -count=1

      - name: Build + Test (middleware/gin)
        working-directory: sdks/go/middleware/gin
        run: |
          go build ./...
          go test ./... -count=1

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: sdks/go/coverage.out
          retention-days: 7

  fuzz:
    name: Fuzz (bounded)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: sdks/go/go.mod
          cache-dependency-path: sdks/go/go.sum

      - name: Fuzz evidence validator (30s)
        working-directory: sdks/go
        run: go test ./evidence -run=^$ -fuzz=^FuzzValidate$ -fuzztime=30s
